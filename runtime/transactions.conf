# bricks transctions table (loaded by txn/dispatcher.go).
# Format: transid:type:program[:groups]
#   transid  — 4-character transaction id (case-insensitive)
#   type     — rexx | cobol (cobol reserved for v2)
#   program  — file name relative to the matching <type>_dir in bricks.conf
#   groups   — optional, comma-separated, case-insensitive ACL.
#              Two reserved tokens:
#                public  — allows unauthenticated callers
#                *       — allows any signed-on user regardless of group
#              Omitted (or empty) = means PUBLIC
#              The CSSN sign-on flow attaches groups from runtime/users.conf;
#              the dispatchr matches them case-insensitively against this list.
#
HELO:rexx:hello.rexx:public
CUST:rexx:cust.rexx:public
CUSV:rexx:cusv.rexx:public
CUSL:rexx:cusl.rexx:public
TEST:rexx:test.rexx:users,admin
QAGE:rexx:qage.rexx:public,users,admin
QAGR:rexx:qagr.rexx:public,users,admin
PROD:rexx:prod.rexx:users,admin
CONS:rexx:cons.rexx:users,admin
HELP:rexx:help.rexx:public,users,admin
GETC:rexx:getc.rexx:public,users,admin
HELC:cobol:hello.cob:public
CHEL:cobol:help.cob:public
QAGC:cobol:qagc.cob:public,users,admin
GUST:cobol:gust.cob:public
GUSV:cobol:gusv.cob:public
GUSL:cobol:gusl.cob:public
EXAM:cobol:exam.cob:public
EXAR:rexx:exam.rexx:public
ORDR:cobol:ordr.cob:public
TIMR:rexx:timr.rexx:public,users,admin
TIMC:cobol:timc.cob:public,users,admin
