# bricks databases catalogue. One PG database per line.
# Format: name[:description]
#   name        -- Postgres database name. Must be a valid PG
#                  identifier (letters / digits / underscore;
#                  starts with letter or underscore; max 63 bytes).
#   description -- operator-facing label shown on CEDA DATABASE
#                  (optional; defaults to the name).
#
# The first row is the DEFAULT database -- transactions whose
# transactions.conf row has no 5th field bind to it. bricks does
# NOT create / drop the PG-side database itself; rows here just
# tell bricks which databases to open at startup.
#
# CEDA DATABASE supports A (add), D (delete), U (alter description)
# for in-place edits; the file is rewritten atomically on every
# mutation.
bricks:default application data
